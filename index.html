<!DOCTYPE html>
<html lang="zh-TW">
<head> <link rel="icon" type="image/x-icon" href="favicon.ico">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>辦公室備忘便條紙</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="辦公便條">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8 font-sans">

  <script>
    const SUPABASE_URL = "https://kfmxihgsfqejsguygfry.supabase.co"; 
    const SUPABASE_ANON_KEY = "sb_publishable_3iniSWfDIJ8YYTl_isbJXg_Urn1zkEY"; 
    
    // 初始化 Supabase
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  </script>

  <div class="max-w-7xl mx-auto">
    <header class="mb-8 text-center lg:text-left border-b border-gray-200 pb-4">
      <h1 class="text-3xl font-extrabold text-gray-800 mb-2">📌 兄弟看板・辦公室備忘錄</h1>
      <p class="text-sm text-gray-500">上班共用電腦、下班手機即時同步，重要事項不漏接</p>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
      
      <section class="lg:col-span-4 bg-white p-5 rounded-2xl shadow-sm lg:sticky lg:top-6">
        <h2 class="text-lg font-bold text-gray-700 mb-4 flex items-center gap-1">
          <span>✏️ 新增備忘</span>
        </h2>
        <form id="note-form" class="space-y-4">
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-xs font-semibold text-gray-500 mb-1">記錄人</label>
              <select id="author" class="w-full border border-gray-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-yellow-400 focus:outline-none">
                <option value="妹妹">妹妹</option>
                <option value="哥哥">哥哥</option>
              </select>
            </div>
            <div>
              <label class="block text-xs font-semibold text-gray-500 mb-1">便條顏色</label>
              <div class="flex space-x-1.5 pt-1">
                <label class="cursor-pointer">
                  <input type="radio" name="color" value="yellow" checked class="sr-only peer">
                  <span class="w-6 h-6 rounded-full bg-yellow-200 block peer-checked:ring-4 peer-checked:ring-yellow-400"></span>
                </label>
                <label class="cursor-pointer">
                  <input type="radio" name="color" value="blue" class="sr-only peer">
                  <span class="w-6 h-6 rounded-full bg-blue-200 block peer-checked:ring-4 peer-checked:ring-blue-400"></span>
                </label>
                <label class="cursor-pointer">
                  <input type="radio" name="color" value="red" class="sr-only peer">
                  <span class="w-6 h-6 rounded-full bg-red-200 block peer-checked:ring-4 peer-checked:ring-red-400"></span>
                </label>
                <label class="cursor-pointer">
                  <input type="radio" name="color" value="green" class="sr-only peer">
                  <span class="w-6 h-6 rounded-full bg-green-200 block peer-checked:ring-4 peer-checked:ring-green-400"></span>
                </label>
              </div>
            </div>
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1">便條內容 (可隨時在卡片上點擊修改)</label>
            <textarea id="content" rows="4" required class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-yellow-400 focus:outline-none" placeholder="例如：訂葵珍 10 包..."></textarea>
          </div>
          <button type="submit" class="w-full py-2.5 bg-yellow-400 hover:bg-yellow-500 text-gray-800 font-bold rounded-lg transition-colors text-sm shadow-sm">
            📌 貼上便條
          </button>
        </form>
      </section>

      <main class="lg:col-span-8 space-y-8">
        <div id="notes-container" class="grid grid-cols-1 sm:grid-cols-2 gap-6">
          </div>

        <div class="border border-gray-200 rounded-xl overflow-hidden bg-white shadow-sm">
          <button 
            type="button" 
            onclick="toggleArchiveDrawer()"
            class="w-full bg-gray-50 hover:bg-gray-100 p-4 flex justify-between items-center transition-colors focus:outline-none border-b border-gray-100"
          >
            <span class="font-bold text-gray-600 flex items-center gap-2">
              📂 歷史歸檔便條紙 (<span id="archive-count">0</span>)
            </span>
            <span id="drawer-arrow" class="text-gray-400 transform transition-transform duration-200">
              ▼
            </span>
          </button>
          
          <div id="archive-drawer" class="hidden p-6 bg-gray-50">
            <div id="archived-notes-container" class="grid grid-cols-1 sm:grid-cols-2 gap-6">
              </div>
          </div>
        </div>
      </main>

    </div>
  </div>

  <script>
    const notesContainer = document.getElementById('notes-container');
    const archivedNotesContainer = document.getElementById('archived-notes-container');
    const archiveCountSpan = document.getElementById('archive-count');
    const noteForm = document.getElementById('note-form');

    const colorClasses = {
      yellow: 'bg-yellow-100 border-yellow-300 text-yellow-900',
      blue: 'bg-blue-100 border-blue-300 text-blue-900',
      red: 'bg-red-100 border-red-300 text-red-900',
      green: 'bg-green-100 border-green-300 text-green-900'
    };

    const archivedColorClasses = {
      yellow: 'bg-gray-200 bg-opacity-60 border-gray-300 text-gray-600',
      blue: 'bg-gray-200 bg-opacity-60 border-gray-300 text-gray-600',
      red: 'bg-gray-200 bg-opacity-60 border-gray-300 text-gray-600',
      green: 'bg-gray-200 bg-opacity-60 border-gray-300 text-gray-600'
    };

    function formatTime(isoString) {
      const d = new Date(isoString);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
    }

    // 控制歸檔抽屜展開/收合
    function toggleArchiveDrawer() {
      const drawer = document.getElementById('archive-drawer');
      const arrow = document.getElementById('drawer-arrow');
      if (drawer.classList.contains('hidden')) {
        drawer.classList.remove('hidden');
        arrow.style.transform = 'rotate(180deg)';
      } else {
        drawer.classList.add('hidden');
        arrow.style.transform = 'rotate(0deg)';
      }
    }

    // 1. 取得並分流渲染「未歸檔」與「已歸檔」的便條
    async function fetchNotes() {
      const { data, error } = await supabaseClient
        .from('office_sticky_notes')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) {
        console.error('Error fetching notes:', error);
      } else {
        const activeNotes = data.filter(n => !n.is_archived);
        const archivedNotes = data.filter(n => n.is_archived);
        
        renderActiveNotes(activeNotes);
        renderArchivedNotes(archivedNotes);
      }
    }

    // 2. 渲染未歸檔的主看板
    function renderActiveNotes(notes) {
      notesContainer.innerHTML = '';
      if (notes.length === 0) {
        notesContainer.innerHTML = `
          <div class="col-span-full text-center py-12 text-gray-400 bg-white rounded-2xl shadow-sm border border-dashed border-gray-200">
            目前沒有任何便條紙，今天也是順利的一天！
          </div>
        `;
        return;
      }

      notes.forEach(note => {
        const bgClass = colorClasses[note.color] || colorClasses.yellow;
        const card = document.createElement('div');
        card.className = `p-5 rounded-xl border shadow-sm relative flex flex-col justify-between transition-transform transform hover:-translate-y-1 ${bgClass}`;
        card.innerHTML = `
          <div>
            <div class="flex justify-between items-center mb-2">
              <span class="font-bold text-sm bg-white bg-opacity-60 px-2 py-0.5 rounded-full">${note.author}</span>
              <span class="text-xs opacity-75">${formatTime(note.created_at)}</span>
            </div>
            <textarea 
              onblur="updateNoteContent('${note.id}', this.value)"
              class="w-full bg-transparent resize-none focus:bg-white focus:bg-opacity-40 p-1 rounded focus:outline-none text-base leading-relaxed"
              rows="4"
            >${note.content}</textarea>
          </div>
          <div class="flex justify-between items-center mt-4 pt-2 border-t border-black border-opacity-10">
            <span class="text-xs opacity-50">點擊文字可直接修改</span>
            <button 
              onclick="archiveNote('${note.id}')"
              class="px-3 py-1 bg-white bg-opacity-80 hover:bg-opacity-100 text-xs font-semibold rounded shadow-sm text-gray-700 transition-colors"
            >
              ✅ 歸檔
            </button>
          </div>
        `;
        notesContainer.appendChild(card);
      });
    }

    // 3. 渲染已歸檔的抽屜內部
    function renderArchivedNotes(notes) {
      archivedNotesContainer.innerHTML = '';
      archiveCountSpan.textContent = notes.length;

      if (notes.length === 0) {
        archivedNotesContainer.innerHTML = `
          <div class="col-span-full text-center py-6 text-gray-400">
            暫無歷史歸檔記錄
          </div>
        `;
        return;
      }

      notes.forEach(note => {
        const bgClass = archivedColorClasses[note.color] || 'bg-gray-200 text-gray-600';
        const card = document.createElement('div');
        card.className = `p-4 rounded-xl border border-gray-300 shadow-inner flex flex-col justify-between ${bgClass}`;
        card.innerHTML = `
          <div>
            <div class="flex justify-between items-center mb-2 opacity-75">
              <span class="font-bold text-xs bg-white bg-opacity-55 px-2 py-0.5 rounded-full">${note.author}</span>
              <span class="text-[10px]">${formatTime(note.created_at)}</span>
            </div>
            <p class="text-sm line-through opacity-70 whitespace-pre-wrap">${note.content}</p>
          </div>
          <div class="flex justify-end mt-3 pt-2 border-t border-gray-300 border-opacity-50">
            <button 
              onclick="unarchiveNote('${note.id}')"
              class="px-2 py-0.5 bg-white bg-opacity-70 hover:bg-opacity-100 text-[10px] font-medium rounded shadow-sm text-gray-600 transition-colors"
            >
              ↩️ 還原至看板
            </button>
          </div>
        `;
        archivedNotesContainer.appendChild(card);
      });
    }

    // 4. 送出新便條
    noteForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const author = document.getElementById('author').value;
      const content = document.getElementById('content').value;
      const color = document.querySelector('input[name="color"]:checked').value;

      const { error } = await supabaseClient
        .from('office_sticky_notes')
        .insert([{ author, content, color }]);

      if (error) {
        alert('新增失敗，請檢查網路連線或金鑰配置！');
        console.error(error);
      } else {
        document.getElementById('content').value = '';
      }
    });

    // 5. 修改便條內容
    async function updateNoteContent(id, newContent) {
      const { error } = await supabaseClient
        .from('office_sticky_notes')
        .update({ content: newContent })
        .eq('id', id);

      if (error) console.error('Error updating note:', error);
    }

    // 6. 歸檔便條 (更新 is_archived 為 true)
    async function archiveNote(id) {
      const { error } = await supabaseClient
        .from('office_sticky_notes')
        .update({ is_archived: true })
        .eq('id', id);

      if (error) console.error('Error archiving note:', error);
    }

    // 7. 還原便條 (更新 is_archived 為 false)
    async function unarchiveNote(id) {
      const { error } = await supabaseClient
        .from('office_sticky_notes')
        .update({ is_archived: false })
        .eq('id', id);

      if (error) console.error('Error unarchiving note:', error);
    }

    // 8. 開啟 Supabase Realtime 即時同步監聽
    supabaseClient
      .channel('public:office_sticky_notes')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'office_sticky_notes' }, () => {
        fetchNotes();
      })
      .subscribe();

    // 初始化載入
    fetchNotes();
  </script>
</body>
</html>
